<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品號-圖號維護 - 生產資訊中心</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pico.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .management-container {
            margin-top: 2rem;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .search-box {
            flex-grow: 1;
            margin-bottom: 0 !important;
        }

        .table-container {
            overflow-x: auto;
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 1rem;
            box-shadow: var(--pico-card-box-shadow);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .required-mark {
            color: var(--pico-form-element-invalid-active-border-color);
        }

        .status-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .badge-success {
            background-color: #28a745;
            color: white;
        }

        .badge-warning {
            background-color: #ffc107;
            color: black;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.2rem 0.6rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <main class="container">
        <header>
            <h1>品號-圖號維護系統</h1>
            <p>管理品號與對應圖號的關聯資料</p>
        </header>

        <nav>
            <ul>
                <li><a href="/procurement">採購儀表板</a></li>
                <li><a href="/allocated-shortage">已撥缺料</a></li>
                <li><a href="/order_query">訂單查詢</a></li>
                <li><a href="/admin_dashboard">後台管理</a></li>
                {% if is_admin %}
                <li><a href="/part-drawing-management" class="active">品號-圖號維護</a></li>
                <li><a href="/component-requirements">成品組件需求</a></li>
                {% endif %}
                <li><a href="/work-order-statistics">工單詳情統計</a></li>
                <li><a href="/finished-wo-materials">成品用料查詢</a></li>
            </ul>
        </nav>

        <hr>

        <section class="management-container">
            <div class="action-bar">
                <div class="search-box">
                    <input type="search" id="search-input" placeholder="搜尋品號或圖號..." aria-label="Search">
                </div>
                <div class="btn-group">
                    <button id="add-single-btn" class="contrast">➕ 新增筆</button>
                    <button id="batch-import-btn" class="secondary">📤 批量匯入</button>
                </div>
            </div>

            <div class="table-container">
                <table id="mapping-table">
                    <thead>
                        <tr>
                            <th>品號</th>
                            <th>圖號</th>
                            <th>最後更新</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="mapping-tbody">
                        <tr>
                            <td colspan="4" style="text-align: center;">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prev-page" class="outline btn-sm">上一頁</button>
                <span id="page-info">第 1 / 1 頁 (共 0 筆)</span>
                <button id="next-page" class="outline btn-sm">下一頁</button>
            </div>
        </section>
    </main>

    <!-- 新增/編輯 Modal -->
    <dialog id="mapping-modal">
        <article>
            <header>
                <a href="#close" aria-label="Close" class="close" id="close-modal-x"></a>
                <h3 id="modal-title">新增對照資料</h3>
            </header>
            <form id="mapping-form">
                <div class="grid">
                    <label for="part-number">
                        品號 <span class="required-mark">*</span>
                        <input type="text" id="part-number" name="part_number" placeholder="請輸入品號" required>
                    </label>
                    <label for="drawing-number">
                        圖號 <span class="required-mark">*</span>
                        <input type="text" id="drawing-number" name="drawing_number" placeholder="請輸入圖號" required>
                    </label>
                </div>
                <input type="hidden" id="edit-mode" value="false">
                <p id="error-message" style="color: red; display: none;"></p>
            </form>
            <footer>
                <button class="secondary" id="cancel-btn">取消</button>
                <button id="save-btn">儲存</button>
            </footer>
        </article>
    </dialog>

    <!-- 批量匯入 Modal -->
    <dialog id="import-modal">
        <article>
            <header>
                <a href="#close" aria-label="Close" class="close" id="close-import-x"></a>
                <h3>批量匯入資料</h3>
            </header>
            <div class="import-content">
                <p>請選擇 Excel 檔案 (.xls, .xlsx) 進行匯入。</p>
                <p><small>※ 檔案需包含「品號」與「圖號」兩個欄位。</small></p>
                <input type="file" id="excel-file" accept=".xls, .xlsx">
                <div id="import-progress" style="display: none;">
                    <progress id="import-progress-bar" value="0" max="100"></progress>
                    <p id="import-status">處理中...</p>
                </div>
            </div>
            <footer>
                <button class="secondary" id="cancel-import-btn">取消</button>
                <button id="start-import-btn" disabled>開始匯入</button>
            </footer>
        </article>
    </dialog>

    <script src="{{ url_for('static', filename='js/exceljs.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/part-drawing.js') }}"></script>
</body>

</html>
